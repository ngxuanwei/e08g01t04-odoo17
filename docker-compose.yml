services:
 
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: is214
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
 
  odoo:
    image: odoo:99.0-BROKEN
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: is214
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./extra-addons:/mnt/extra-addons
 
  backup:
    image: postgres:15
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGPASSWORD: is214
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c "
      while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h db -U odoo postgres > /backups/db_$$TIMESTAMP.sql;
        echo Backup done: $$TIMESTAMP;
        find /backups -name '*.sql' -mtime +7 -delete;
        sleep 86400;
      done"
 
volumes:
  odoo-web-data:
  odoo-db-data:
